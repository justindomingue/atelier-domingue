# Final garment measurements for easy-fitting selvedge denim
# (not body scan — ease already included)
# TODO: verify circumferences for MM&S trouser block — MM&S expects body-snug
# measurements (no ease); the draft formulas add ease themselves.
measurements:
  side_length: 37.50 # in - outside leg, waist to floor (includes waistband)
  inseam: 25.00 # in - TODO: remeasure — cropped-jean length, too short for trousers (~30-32" expected)
  waist: 39.00 # in - pant waist circumference
  seat: 44.00 # in - hip/seat circumference (fullest part)
  waistband_width: 1.5 # in - waistband width
  hem_width: 18.0 # in - desired hem opening (full width)
  knee_width: 20.0 # in - desired knee opening (full width)
  unit: inch

  # Additional body measurements (not used by jeans pattern yet)
  # chest: 42
  # natural_waist: 37
  # neck: 16
  # bicep: 15
  # wrist: 7
  # thigh: 24
  # calf: 15
  # ankle: 10

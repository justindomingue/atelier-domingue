# Final garment measurements for easy-fitting selvedge denim
# (not body scan — ease already included)
#
# The 1873 draft sits at the NATURAL WAIST (historical convention), not
# at the hip bone. side_length must be measured from natural waist to hem.
# TODO: measure Andrew's actual natural-waist outseam (currently estimated
# at 40.5" to give an ~10" rise).
measurements:
  side_length: 40.00 # in - natural-waist to hem (1873 convention)
  inseam: 29.00 # in - crotch to hem
  waist: 38.00 # in - pant waist circumference
  seat: 44.00 # in - hip/seat circumference (fullest part)
  waistband_width: 1.5 # in - waistband width
  hem_width: 18.0 # in - desired hem opening (full width)
  knee_width: 20.0 # in - desired knee opening (full width)
  unit: inch

  # Additional body measurements (not used by jeans pattern yet)
  # chest: 42
  # natural_waist: 37
  # neck: 16
  # bicep: 15
  # wrist: 7
  # thigh: 24
  # calf: 15
  # ankle: 10

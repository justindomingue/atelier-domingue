measurements:
  side_length: 40.00 # in - outside leg, waist to floor
  inseam: 32.00 # in - crotch to floor
  waist: 34.00 # in - circumference at natural waist
  seat: 40.00 # in - circumference around fullest part (hip girth)
  waistband_width: 1.5 # in - waistband width
  hem_width: 18.0 # in - desired hem opening (full width)
  knee_width: 20.0 # in - desired knee opening (full width)
  unit: inch

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Shape Editor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <div class="sidebar">
            <h1>Pocket Editor</h1>

            <div class="control-group">
                <label for="measurements-select">Measurements</label>
                <select id="measurements-select">
                    {% for m in measurements %}
                    <option value="{{ m }}" {% if m == 'justin_1873_jeans.yaml' %}selected{% endif %}>{{ m | replace('.yaml', '') }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="control-group">
                <label for="units-select">Units</label>
                <select id="units-select">
                    <option value="cm" selected>cm</option>
                    <option value="inch">inch</option>
                </select>
            </div>

            <div class="stats">
                <div class="stat"><span class="stat-label">Length</span><span id="curve-length">—</span></div>
                <div class="stat"><span class="stat-label">Width</span><span id="curve-width">—</span></div>
                <div class="stat"><span class="stat-label">Height</span><span id="curve-height">—</span></div>
            </div>

            <div class="actions">
                <button id="reset-btn" class="btn">Reset</button>
                <button id="generate-btn" class="btn btn-primary">Generate Pieces</button>
            </div>

            <div id="loading-indicator" class="hidden">Generating...</div>

            <div id="pieces-container"></div>
        </div>

        <div class="canvas-area">
            <canvas id="editor-canvas"></canvas>
        </div>
    </div>

    <script src="/static/editor.js"></script>
</body>
</html>
